spring.application.name=code-health-checker
server.port=${PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:mem:codehealth;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# GitHub Mock Mode (set to false to use real GitHub API)
github.mock.enabled=true
github.api.token=

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always