version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: codehealth-db
    environment:
      POSTGRES_DB: healthdb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health123
    ports:
      - "5436:5432"
    volumes:
      - postgres_health_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d healthdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_health_data: